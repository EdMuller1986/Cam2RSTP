name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Install Android SDK with auto-accepted licenses
        run: |
          set -e
          export ANDROID_HOME="$HOME/android-sdk"
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp
          curl -sSLo cmdline-tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip -d /tmp/clt
          mv /tmp/clt/cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" > /dev/null
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH" >> $GITHUB_ENV
          echo "Android SDK installed at $ANDROID_HOME"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate signing keystore
        run: |
          set -e
          mkdir -p app/keystore
          KEYSTORE=app/keystore/release-debug.keystore
          keytool -genkeypair -v \
            -keystore "$KEYSTORE" \
            -storepass android \
            -keypass android \
            -alias camrtsp \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=CamRTSP, O=Local, C=RU"
          echo "Keystore created: $KEYSTORE"
          ls -la "$KEYSTORE"

      - name: Build signed release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Locate and verify APK
        id: find_apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          ls -lh "$APK"
          echo "=== APK signature verification ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose "$APK" | head -20

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          fail_on_unmatched_files: true

      - name: Upload APK as artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: CamRTSP-signed
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
